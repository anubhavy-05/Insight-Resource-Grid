<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .dashboard-container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-left: 5px solid #ffc107; }
        .btn { padding: 8px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        .btn-approve { background-color: #28a745; }
        .btn-delete { background-color: #dc3545; }
        .nav-link { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <a href="index.html" class="nav-link">⬅ Go to Public Page</a>
        <h2>👑 Admin Dashboard - Pending Approvals</h2>
        
        <div id="admin-container">
            <p>Loading pending resources...</p>
        </div>
    </div>

    <script>
        // 🔒 Check if user has token (We should ideally check if role is admin too, but backend will protect us anyway)
        const MY_JWT_TOKEN = localStorage.getItem('insight_token');
        if (!MY_JWT_TOKEN) {
            alert("Admin Access Only! Please login.");
            window.location.href = "login.html";
        }

        const container = document.getElementById('admin-container');

        // Data laane wala function
        async function fetchPendingResources() {
            try {
                const response = await fetch('http://127.0.0.1:8000/admin/resources/pending', {
                    headers: { 'Authorization': `Bearer ${MY_JWT_TOKEN}` }
                });
                
                if (response.status === 403) {
                    container.innerHTML = "<p style='color:red;'>Access Denied. You are not an Admin!</p>";
                    return;
                }

                const resources = await response.json();
                container.innerHTML = ''; 

                if (resources.length === 0) {
                    container.innerHTML = "<p>No pending resources to approve! 🎉</p>";
                    return;
                }

                resources.forEach(resource => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${resource.title}</h3>
                        <p>${resource.description}</p>
                        <p><a href="${resource.link}" target="_blank">View Link</a></p>
                        <button class="btn btn-approve" onclick="approveResource(${resource.id})">✅ Approve</button>
                        <button class="btn btn-delete" onclick="deleteResource(${resource.id})">🗑️ Delete</button>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = "<p style='color:red;'>Error loading data.</p>";
            }
        }

        // Approve karne wala function
        async function approveResource(id) {
            try {
                const response = await fetch(`http://127.0.0.1:8000/resources/${id}/approve`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${MY_JWT_TOKEN}` }
                });
                if (response.ok) {
                    alert("Resource Approved!");
                    fetchPendingResources(); // Screen ko refresh karo
                }
            } catch (error) { alert("Error approving resource"); }
        }

        // Delete karne wala function
        async function deleteResource(id) {
            if (!confirm("Are you sure you want to delete this permanently?")) return;
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/resources/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${MY_JWT_TOKEN}` }
                });
                if (response.ok) {
                    alert("Resource Deleted!");
                    fetchPendingResources(); // Screen ko refresh karo
                }
            } catch (error) { alert("Error deleting resource"); }
        }

        // Page load hote hi data fetch karo
        fetchPendingResources();
    </script>
</body>
</html>
