<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Resource Grid</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; max-width: 900px; margin: 0 auto; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* 🔍 Search Bar Style */
        .search-input { padding: 12px; width: 100%; max-width: 400px; border: 2px solid #007bff; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        .search-input:focus { box-shadow: 0 0 8px rgba(0, 123, 255, 0.5); }
        
        .resource-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .resource-title { color: #333; margin-top: 0; }
        .resource-link { display: inline-block; margin-top: 10px; padding: 8px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .nav-links a { margin-left: 15px; color: #007bff; text-decoration: none; font-weight: bold; padding: 8px 12px; background: #e9ecef; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>📚 Approved Resources</h1>
        <div class="nav-links">
            <a href="upload.html">➕ Upload New</a>
            <a href="admin.html">👑 Admin</a>
        </div>
    </div>
    
    <input type="text" id="searchBar" class="search-input" placeholder="🔍 Search by title or description..." onkeyup="filterResources()">
    <br><br>

    <div id="resources-container">
        <p>Loading resources from backend...</p>
    </div>

    <script>
        // Ye function aapke Python Backend se data layega
        async function fetchResources() {
            try {
                const response = await fetch('http://127.0.0.1:8000/resources/');
                const resources = await response.json();
                
                const container = document.getElementById('resources-container');
                container.innerHTML = ''; 

                resources.forEach(resource => {
                    const card = document.createElement('div');
                    card.className = 'resource-card';
                    
                    card.innerHTML = `
                        <h2 class="resource-title">${resource.title}</h2>
                        <p class="resource-desc">${resource.description}</p>
                        <p><small>Uploaded by User ID: ${resource.owner_id}</small></p>
                        <a href="${resource.link}" class="resource-link" target="_blank">View Resource</a>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                document.getElementById('resources-container').innerHTML = "<p style='color:red;'>Failed to load data.</p>";
            }
        }

        // 🚀 SMART SEARCH FUNCTION (Frontend Filtering)
        function filterResources() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('resource-card');

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.resource-title').innerText.toLowerCase();
                let desc = cards[i].querySelector('.resource-desc').innerText.toLowerCase();
                
                // Agar title ya description me wo word hai, toh card dikhao, warna hide kardo
                if (title.includes(input) || desc.includes(input)) {
                    cards[i].style.display = ""; 
                } else {
                    cards[i].style.display = "none"; 
                }
            }
        }

        fetchResources();
    </script>
</body>
</html>
